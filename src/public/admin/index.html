<!DOCTYPE html>
<html>
<head>
    <title>CollaboKeys Admin</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="item header">
            <h1>CollaboKeys Admin</h1>
            <p id="normalInfo"><i><b>BETA:</b> Use CollaboKeys admin controls from another device. <a href="https://github.com/tinkerer9/collaborativekeys/tree/main">GitHub</a></i></p>
            <p id="noAdminInfo" class="bad"><i><b>The CollaboKeys admin page is currently disabled. Please go to src/config.json to enable.</b></i></p>
        </div>

        <div class="item controls">
            <h2 class="contentHeaders">Controls:</h2>
            <div class="authentication">
                <p>Please enter the admin password:</p>
                <input type="password" id="input" placeholder="Password">
                <button id="enter">Continue</button>
            </div>
            <div class="controlButtons">
                <input type="text" id="customCommandText" placeholder="Custom Command">
                <button id="customCommand">Enter</button><br><br>

                <button id="stopCommand">stop</button><br><br>
                
                <button id="pauseCommand">pause</button><br>
                <button id="resumeCommand">resume</button><br><br>

                
                <select id="wrCommandArg0">
                    <option value="admit">admit</option>
                    <option value="dismiss">dismiss</option>
                </select>
                <select id="wrCommandArg1" onchange="wrCommandArg1Changed()">
                    <option value="all">all</option>
                    <option value="player">player</option>
                </select>
                <input type="number" id="wrCommandArg2" min="1" step="1" placeholder="Player ID">
                <button id="wrCommand">waitingroom</button><br><br>

                <select id="lsCommandArg0">
                    <option value="all">all</option>
                    <option value="active">active</option>
                    <option value="waitingroom">waitingroom</option>
                    <option value="nameless">nameless</option>
                </select>
                <button id="lsCommand">list</button><br><br>

                <select id="keyCommandArg0">
                    <option value="revoke">revoke</option>
                    <option value="enable">enable</option>
                    <option value="disable">disable</option>
                </select>
                <select id="keyCommandArg1" onchange="keyCommandArg1Changed()">
                    <option value="all">all</option>
                    <option value="keyname">keyname</option>
                </select>
                <input type="input" id="keyCommandArg2" placeholder="Keyname">
                <button id="keyCommand">key</button><br><br>
            </div>
        </div>

        <div class="item responses">
            <h2 class="contentHeaders">Responses:</h2>
            <ui id="responsesList"></ui><br>
        </div>
        
        <div class="item logs">
            <h2 class="contentHeaders">Logs:</h2>
            <ui id="logList"></ui><br>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
