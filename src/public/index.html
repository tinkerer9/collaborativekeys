<!DOCTYPE html>
<html>
<head>
    <title>Key Press Client</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
    <div class="pl">
        <h1>Press Any Key!</h1>
        <p class="showAfterNaming"><i><b>Instructions:</b> be the first person to press a key to reserve it. Only you can use that key to play the game!</i></p>
    </div>

    <div class="chat">
        <ui id="list"></ui>
        <label for="input" class="hideAfterNaming">Please choose a username:</label><br class="hideAfterNaming">
        <input type="text" id="input" class="hideAfterNaming" placeholder="Username"><button id="enter" class="hideAfterNaming">Continue</button>
    </div>

    <div class="keyboard"></div>

    <div class="screen">
        <ui id="list"></ui>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
