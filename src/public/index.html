<!DOCTYPE html>
<html>
<head>
    <title>CollaboKeys Player</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="item header">
            <h1>CollaboKeys</h1>
            <p><i>Be the first person to press a key to reserve it.<br>Only you can use that key to play the game! Have fun! <a href="https://github.com/tinkerer9/collaborativekeys/tree/main">GitHub</a></i></p>
        </div>

        <div class="item logs">
            <div class="naming">
                <p>Please choose a username to play:</p>
                <input type="text" id="input" placeholder="Username">
                <button id="enter">Continue</button>
            </div>
            <h2 class="contentHeaders">Log:</h2>
            <ui id="logList"></ui><br>
        </div>

        <div class="item keys">
            <h2 class="contentHeaders">Your keys:</h2>
            <ui id="keysList"></ui><br>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
