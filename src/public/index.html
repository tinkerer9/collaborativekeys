<!DOCTYPE html>
<html>
<head>
    <title>CollaboKeys Client</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="pl">
        <h1 class="interdiv">CollaboKeys</h1>
        <p class="showAfterNaming interdiv"><i><b>Instructions:</b> be the first person to press a key to reserve it.<br>Only you can use that key to play the game!<br>Ignore the lag. Have fun!</i></p>
    </div>

    <div class="chat">
        <p class="hideAfterNaming interdiv" id="inputlabel">Please choose a username:</p>
        <input type="text" id="input" class="hideAfterNaming interdiv" placeholder="Username">
        <button id="enter" class="hideAfterNaming">Continue</button><br class="hideAfterNaming">
        <ui id="list"></ui>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
